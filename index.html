<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Frame-Options" content="DENY">
<title>L&#9829;H TOOLKIT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ═══ LIGHT NEUMORPHISM (default) ═══ */
:root{
  --bg:#e8ecf0;
  --nm:#e0e6ed;
  --nl:#ffffff;
  --nd:#c8d0dc;
  --ac:#ff3366;
  --ac2:#ff6b35;
  --gd:#f59e0b;
  --tx:#1a1a2e;
  --tx2:#4a5568;
  --mt:#94a3b8;
  --gr:#10b981;
  --bl:#3b82f6;
  --gw:rgba(255,51,102,0.2);
  --shadow:8px 8px 20px #c8d0dc,-8px -8px 20px #ffffff;
  --shadow-sm:5px 5px 12px #c8d0dc,-5px -5px 12px #ffffff;
  --shadow-in:inset 4px 4px 10px #c8d0dc,inset -4px -4px 10px #ffffff;
}
/* ═══ DARK NEUMORPHISM ═══ */
[data-theme="dark"]{
  --bg:#1e2235;
  --nm:#232840;
  --nl:#2a3050;
  --nd:#141828;
  --tx:#e0e8f0;
  --tx2:#8899bb;
  --mt:#4a5580;
  --gw:rgba(255,51,102,0.35);
  --shadow:8px 8px 20px #141828,-8px -8px 20px #2a3050;
  --shadow-sm:5px 5px 12px #141828,-5px -5px 12px #2a3050;
  --shadow-in:inset 4px 4px 10px #141828,inset -4px -4px 10px #2a3050;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:"Rajdhani",sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

/* SCREENS */
.scr{display:none;}
.scr.on{display:flex;}
#ls.on{position:fixed;inset:0;z-index:200;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;padding:20px;background:var(--bg);}
#ws.on{position:fixed;inset:0;z-index:500;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);}
#ts.on{flex-direction:column;min-height:100vh;}


/* FALLING FLOWERS */
.flowers{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.flower{position:absolute;top:-60px;font-size:1.8rem;animation:fall linear infinite;opacity:0;}
@keyframes fall{
  0%{transform:translateY(-60px) rotate(0deg);opacity:1;}
  80%{opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
/* THEME BTN - fixed top right */
.thb{position:fixed;top:14px;right:14px;z-index:300;width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;background:var(--nm);box-shadow:var(--shadow-sm);color:var(--tx2);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.thb:hover{color:var(--ac);}

/* LOGIN CARD */
.lc{position:relative;z-index:10;width:100%;max-width:400px;padding:38px 26px 30px;background:var(--nm);box-shadow:var(--shadow);border-radius:24px;text-align:center;animation:ci .6s ease;}
@keyframes ci{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* LOGO */
.lg{width:90px;height:90px;border-radius:22px;object-fit:cover;display:block;margin:0 auto 14px;
  box-shadow:var(--shadow-sm),0 0 20px var(--gw);
  animation:hb 2.8s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

.lt{font-family:"Orbitron",sans-serif;font-size:1.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--ac),var(--gd));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;letter-spacing:2px;}
.lsub{color:var(--tx2);font-size:.88rem;margin-bottom:22px;}

/* INPUT */
.iw{position:relative;margin-bottom:14px;}
.iw .ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--mt);font-size:.88rem;z-index:3;pointer-events:none;}
.ki{width:100%;padding:13px 16px 13px 42px;
  background:var(--nm);box-shadow:var(--shadow-in);
  border:2px solid transparent;border-radius:12px;
  color:var(--tx);font-size:1rem;font-family:"Rajdhani",sans-serif;outline:none;
  position:relative;z-index:2;caret-color:var(--ac);transition:border .2s;}
.ki::placeholder{color:var(--mt);}
.ki:focus{border-color:var(--ac);}
/* Animated border */
.iw::before{content:"";position:absolute;inset:-2px;border-radius:14px;padding:2px;
  background:linear-gradient(90deg,transparent,var(--ac),var(--gd),var(--ac2),transparent);
  background-size:300% 300%;animation:br 6s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;z-index:1;pointer-events:none;}
@keyframes br{0%{background-position:200% center;}100%{background-position:-200% center;}}

/* UNLOCK BTN */
.ubn{width:100%;padding:14px;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  border:none;border-radius:12px;color:#fff;
  font-family:"Orbitron",sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;letter-spacing:2px;
  box-shadow:var(--shadow-sm),0 4px 20px var(--gw);
  transition:all .2s;}
.ubn:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm),0 6px 24px var(--gw);}
.ubn:active{transform:scale(.97);}
.err{color:var(--ac);font-size:.82rem;margin-top:10px;display:none;padding:8px;border-radius:8px;background:rgba(255,51,102,.08);}
.bla{margin-top:12px;color:var(--tx2);font-size:.83rem;}
.wab{display:flex;align-items:center;justify-content:center;gap:9px;
  margin-top:10px;padding:13px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  border-radius:13px;color:#fff!important;text-decoration:none;
  font-family:"Orbitron",sans-serif;font-size:.78rem;font-weight:700;
  letter-spacing:1px;transition:all .2s;
  box-shadow:var(--shadow-sm);}
.wab:hover{transform:translateY(-2px);}
.wab i{font-size:1.2rem;}

/* WELCOME */
.wi{text-align:center;}
.wico{font-size:4.5rem;animation:pu 1.5s ease-in-out infinite;display:block;margin-bottom:10px;}
@keyframes pu{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.wtit{font-family:"Orbitron",sans-serif;font-size:1.9rem;font-weight:900;
  background:linear-gradient(135deg,var(--ac),var(--gd),var(--ac2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:7px;letter-spacing:3px;}
.wmsg{color:var(--tx2);font-size:.98rem;}
.wu{color:var(--gd);font-weight:700;}
.wbar{width:190px;height:4px;background:var(--nd);border-radius:2px;margin:18px auto 0;overflow:hidden;}
.wbf{height:100%;width:0;background:linear-gradient(90deg,var(--ac),var(--gd));border-radius:2px;animation:bf 2s ease-in-out forwards;}
@keyframes bf{to{width:100%;}}

/* TOPBAR */
.tpb{height:62px;background:var(--nm);box-shadow:0 4px 16px var(--nd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;position:sticky;top:0;z-index:100;flex-shrink:0;transition:background .3s;}
.tbrand{font-family:"Orbitron",sans-serif;font-size:.9rem;font-weight:800;
  display:flex;align-items:center;gap:9px;
  background:linear-gradient(135deg,var(--ac),var(--gd));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tbrl{width:34px;height:34px;border-radius:10px;object-fit:cover;box-shadow:var(--shadow-sm);}
.tbri{display:flex;align-items:center;gap:8px;}
.kbdg{background:rgba(245,158,11,.1);color:var(--gd);border:1px solid rgba(245,158,11,.3);
  padding:4px 10px;border-radius:20px;font-size:.7rem;font-family:"Orbitron",sans-serif;}
.icb{width:38px;height:38px;border:none;border-radius:10px;cursor:pointer;
  background:var(--nm);box-shadow:var(--shadow-sm);
  color:var(--tx2);font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icb:hover{color:var(--ac);}

/* CONTENT */
.con{flex:1;padding:20px 16px;max-width:1000px;margin:0 auto;width:100%;}
.stit{font-family:"Orbitron",sans-serif;font-size:.78rem;color:var(--tx2);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;}
.stit::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--nd),transparent);}
.stit i{color:var(--ac);}

/* KEY INFO BAR */
.kib{background:var(--nm);box-shadow:var(--shadow-sm);border-radius:14px;
  padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.kii{width:42px;height:42px;border-radius:11px;background:var(--nm);
  box-shadow:var(--shadow-in);
  display:flex;align-items:center;justify-content:center;color:var(--gd);font-size:1.1rem;}
.kik{font-family:"Orbitron",sans-serif;font-size:.76rem;color:var(--gd);}
.kie{font-size:.74rem;color:var(--tx2);margin-top:2px;}
.kie span{color:var(--gr);font-weight:700;}

/* TOOLS GRID */
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:560px){.tg{grid-template-columns:repeat(2,1fr);}}

/* TOOL CARD */
.tc{background:var(--nm);box-shadow:var(--shadow-sm);
  border-radius:18px;padding:18px 12px;cursor:pointer;
  text-decoration:none;color:var(--tx);
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;
  transition:all .25s;animation:ce .3s ease both;
  border-bottom:2px solid rgba(255,51,102,.15);}
.tc:hover{transform:translateY(-5px);
  box-shadow:10px 10px 24px var(--nd),-10px -10px 24px var(--nl),0 0 20px var(--gw);
  border-bottom-color:var(--ac);}
@keyframes ce{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.tiw{width:50px;height:50px;border-radius:14px;background:var(--nm);
  box-shadow:var(--shadow-in);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--ac);}
.tiw img{width:30px;height:30px;border-radius:8px;object-fit:cover;}
.tnm{font-weight:700;font-size:.88rem;color:var(--tx);}
.tds{font-size:.73rem;color:var(--tx2);line-height:1.3;}
.emp{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--mt);}
.emp i{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.4;}
.ldg{grid-column:1/-1;text-align:center;padding:40px;color:var(--mt);}
.sp{width:36px;height:36px;border-radius:50%;border:3px solid var(--nd);
  border-top-color:var(--ac);animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}

.foot{text-align:center;padding:16px;color:var(--mt);font-size:.75rem;}
.tst{position:fixed;bottom:18px;right:18px;background:var(--nm);box-shadow:var(--shadow-sm);
  color:var(--gr);padding:11px 18px;border-radius:11px;font-size:.85rem;
  transform:translateY(100px);opacity:0;transition:all .4s;z-index:9999;
  border-left:3px solid var(--gr);}
.tst.on{transform:translateY(0);opacity:1;}
.tst.er{color:var(--ac);border-left-color:var(--ac);}
</style>
</head>

// ═══ API ═══
async function api(action,payload){
  try{
    var r=await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:action,payload:payload||{}})});
    return await r.json();
  }catch(e){return{ok:false,msg:"Connection error"};}
}

var curKey=null,curExp=null,curTh="light";

function tst(m,ok){
  var t=document.getElementById("tst");t.textContent=m;
  t.className="tst on"+(ok===false?" er":"");
  setTimeout(function(){t.className="tst";},2800);
}

// ═══ THEME - updates all icons ═══
function setTh(th){
  curTh=th;
  document.documentElement.setAttribute("data-theme",th);
  var ic=th==="dark"?"fa-sun":"fa-moon";
  ["thI","thTk"].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.className="fas "+ic;
  });
  localStorage.setItem("lh_th",th);
}
function togTh(){setTh(curTh==="dark"?"light":"dark");}

function showS(id){
  document.querySelectorAll(".scr").forEach(function(s){s.classList.remove("on");});
  document.getElementById(id).classList.add("on");
}

function getDevId(){
  var raw=navigator.userAgent+navigator.language+screen.width+screen.height;
  var h=0;for(var i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h|=0;}
  return"d_"+Math.abs(h).toString(36);
}

async function doLogin(){
  var k=document.getElementById("lk").value.trim().toUpperCase();
  var e=document.getElementById("err");
  e.style.display="none";
  if(!k){e.textContent="Please enter your license key!";e.style.display="block";return;}
  e.textContent="Verifying...";e.style.color="var(--bl)";e.style.display="block";
  var res=await api("verifyKey",{key:k,deviceId:getDevId()});
  if(!res.ok){e.textContent=res.msg||"Invalid key!";e.style.color="var(--ac)";e.style.display="block";return;}
  e.style.display="none";
  curKey=k;curExp=res.expiry;
  localStorage.setItem("lh_k",k);
  localStorage.setItem("lh_e",res.expiry);
  showWelcome();
}

function showWelcome(){
  showS("ws");
  startFlowers();
  setTimeout(function(){
    stopFlowers();
    showS("ts");
    loadUI();
  },2200);
}

var flowerTimer=null;
var flowerEmojis=["&#127802;","&#127801;","&#127800;","&#127804;","&#127803;","&#10052;","&#127799;","&#127807;"];
function startFlowers(){
  var c=document.getElementById("flowersContainer");
  c.innerHTML="";
  // Create 30 flowers at staggered times
  for(var i=0;i<30;i++){
    (function(idx){
      setTimeout(function(){
        var f=document.createElement("div");
        f.className="flower";
        f.innerHTML=flowerEmojis[Math.floor(Math.random()*flowerEmojis.length)];
        f.style.left=Math.random()*100+"%";
        f.style.fontSize=(1.2+Math.random()*1.4)+"rem";
        var dur=(1.2+Math.random()*1.5)+"s";
        f.style.animation="fall "+dur+" linear forwards";
        f.style.animationDelay=(Math.random()*1.5)+"s";
        c.appendChild(f);
      },idx*60);
    })(i);
  }
}
function stopFlowers(){
  var c=document.getElementById("flowersContainer");
  if(c)c.innerHTML="";
}

async function loadUI(){
  document.getElementById("kSh").textContent=curKey;
  document.getElementById("wU").textContent=curKey.substring(0,8)+"...";
  if(curExp){
    var d=Math.ceil((curExp-Date.now())/86400000);
    document.getElementById("kEx").textContent=d+(d===1?" day":" days");
    document.getElementById("kbdg").innerHTML="<i class='fas fa-clock'></i> "+d+"d";
  }
  // Load tools immediately
  loadTools();
  // Settings background
  api("getSettings",{}).then(function(r){
    if(!r.ok||!r.settings)return;
    var s=r.settings;
    if(s.theme)setTh(s.theme);
    if(s.toolkit){
      var tk=s.toolkit;
      if(tk.name){document.getElementById("wT").textContent=tk.name;document.getElementById("tpN").textContent=tk.name;}
      if(tk.welcome)document.getElementById("wM").textContent=tk.welcome;
      if(tk.logoUrl){document.getElementById("tpL").src=tk.logoUrl;document.getElementById("mLg").src=tk.logoUrl;}
    }
  });
}

async function loadTools(){
  var g=document.getElementById("tG");
  // Show skeleton cards instantly - no loading text
  g.innerHTML="<style>.sk-card{background:var(--nm);box-shadow:var(--shadow-sm);border-radius:18px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:9px;}.sk-ic{width:50px;height:50px;border-radius:14px;background:linear-gradient(90deg,var(--nd) 25%,var(--nl) 50%,var(--nd) 75%);background-size:200% 100%;animation:sk 1.2s ease-in-out infinite;}.sk-tx{height:12px;width:70%;border-radius:6px;background:linear-gradient(90deg,var(--nd) 25%,var(--nl) 50%,var(--nd) 75%);background-size:200% 100%;animation:sk 1.2s ease-in-out infinite;}.sk-tx2{height:10px;width:50%;border-radius:6px;background:linear-gradient(90deg,var(--nd) 25%,var(--nl) 50%,var(--nd) 75%);background-size:200% 100%;animation:sk 1.2s ease-in-out infinite 0.2s;}@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}</style>";
  // Add 6 skeleton cards
  for(var s=0;s<6;s++){
    var sk=document.createElement("div");
    sk.className="tc sk-card";
    sk.style.cursor="default";
    sk.innerHTML="<div class=sk-ic></div><div class=sk-tx></div><div class=sk-tx2></div>";
    g.appendChild(sk);
  }
  
  // Fetch real data
  var res=await api("getTools",{});
  g.innerHTML="";
  if(!res.ok||!res.tools||!res.tools.length){
    g.innerHTML="<div class='emp'><i class='fas fa-tools'></i><p>No tools yet. Check back soon!</p></div>";
    return;
  }
  res.tools.forEach(function(t,i){
    var ic=t.iconBase64?"<img src='"+t.iconBase64+"' alt=''>"
      :"<i class='"+(t.iconClass||"fas fa-star")+"' style='color:var(--ac)'></i>";
    var c=document.createElement("a");
    c.className="tc";
    c.href=t.link||"#";
    c.target="_blank";
    c.rel="noopener noreferrer";
    c.style.animationDelay=(i*.04)+"s";
    c.innerHTML="<div class='tiw'>"+ic+"</div>"
      +"<div class='tnm'>"+t.name+"</div>"
      +(t.desc?"<div class='tds'>"+t.desc+"</div>":"");
    g.appendChild(c);
  });
}
