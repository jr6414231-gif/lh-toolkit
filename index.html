<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L❤️H TOOLKIT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg:#1a1a2e; --nm-bg:#1e2240; --nm-light:#252c52; --nm-dark:#12172c;
  --nm-inset-light:#1c2240; --nm-inset-dark:#10152a;
  --accent:#ff3366; --accent2:#ff6b35; --gold:#ffd700;
  --text:#e0e0f0; --text2:#a0a0c0; --muted:#6060a0;
  --green:#00ff88; --blue:#4fc3f7;
  --glow:rgba(255,51,102,0.4);
  --tr:0.4s cubic-bezier(.23,1,.32,1);
}
[data-theme="light"] {
  --bg:#e8ecf0; --nm-bg:#e0e6ed; --nm-light:#f5f8fc; --nm-dark:#c8cfd8;
  --nm-inset-light:#e8ecf2; --nm-inset-dark:#d0d6de;
  --text:#1a1a2e; --text2:#4a4a6e; --muted:#8888aa;
  --glow:rgba(255,51,102,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}

/* SCREENS */
.screen{display:none;}
.screen.active{display:flex;}
#loginScreen.active{
  position:fixed;inset:0;z-index:200;
  flex-direction:column;align-items:center;justify-content:center;
  overflow-y:auto;padding:20px;
}
#welcomeScreen.active{
  position:fixed;inset:0;z-index:500;
  flex-direction:column;align-items:center;justify-content:center;
}
#toolkitScreen.active{
  flex-direction:column;min-height:100vh;
}

/* BG ORBS */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.12;animation:orbFloat 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;}
.orb2{width:300px;height:300px;background:#7b2fff;top:50%;right:-80px;animation-delay:2s;}
.orb3{width:250px;height:250px;background:var(--blue);bottom:-50px;left:30%;animation-delay:4s;}
.orb4{width:200px;height:200px;background:var(--gold);bottom:20%;left:-50px;animation-delay:1s;}
@keyframes orbFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-30px);}}

/* STREAKS */
.streak{position:absolute;width:2px;opacity:0;background:linear-gradient(to bottom,transparent,var(--accent),transparent);animation:streakFall 5s linear infinite;}
.streak:nth-child(1){left:15%;height:120px;animation-delay:0s;}
.streak:nth-child(2){left:35%;height:80px;animation-delay:1.5s;}
.streak:nth-child(3){left:60%;height:140px;animation-delay:0.8s;}
.streak:nth-child(4){left:80%;height:100px;animation-delay:2.5s;}
.streak:nth-child(5){left:5%;height:90px;animation-delay:3.5s;}
.streak:nth-child(6){right:10%;height:110px;animation-delay:2s;}
@keyframes streakFall{0%{opacity:0;top:-10%;}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;top:110%;}}

/* LOGIN CARD */
.login-card{
  position:relative;z-index:10;
  width:100%;max-width:400px;
  padding:38px 28px 32px;
  background:var(--nm-bg);
  box-shadow:12px 12px 30px var(--nm-dark),-12px -12px 30px var(--nm-light),0 0 60px rgba(255,51,102,.12);
  border-radius:24px;text-align:center;
  animation:cardIn .7s var(--tr);
}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

/* LOGO */
.logo-wrap{margin-bottom:14px;display:inline-block;}
.logo-img{
  width:90px;height:90px;border-radius:22px;object-fit:cover;
  display:block;
  box-shadow:0 0 0 3px rgba(255,51,102,0.3),0 0 28px var(--glow),0 8px 30px rgba(0,0,0,0.5);
  animation:heartbeat 2.8s ease-in-out infinite;
}
@keyframes heartbeat{
  0%,100%{transform:scale(1);box-shadow:0 0 0 3px rgba(255,51,102,0.25),0 0 22px var(--glow);}
  50%{transform:scale(1.05);box-shadow:0 0 0 5px rgba(255,51,102,0.45),0 0 36px var(--glow);}
}

/* TITLE */
.login-title{
  font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:8px 0 4px;letter-spacing:2px;min-height:2rem;
}
.login-sub{color:var(--text2);font-size:.9rem;margin-bottom:26px;min-height:1.2rem;}

/* CURSOR */
.type-cursor,.type-cursor2{
  display:inline-block;color:var(--accent);
  -webkit-text-fill-color:var(--accent);
  animation:blink .7s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* INPUT */
.inp-wrap{position:relative;margin-bottom:16px;}
.inp-wrap i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;z-index:3;pointer-events:none;}
.nm-inp{
  width:100%;padding:13px 16px 13px 42px;
  background:var(--nm-bg);
  box-shadow:inset 4px 4px 10px var(--nm-dark),inset -4px -4px 10px var(--nm-light);
  border:2px solid transparent;border-radius:12px;
  color:var(--text);font-size:1rem;font-family:'Rajdhani',sans-serif;outline:none;
  position:relative;z-index:2;
  -webkit-text-fill-color:var(--text);
  caret-color:var(--accent);
}
.nm-inp::placeholder{color:var(--muted);-webkit-text-fill-color:var(--muted);}
.nm-inp:focus{
  box-shadow:inset 4px 4px 10px var(--nm-dark),inset -4px -4px 10px var(--nm-light);
  border-color:var(--accent);
}

/* ANIMATED BORDER - INPUT */
.inp-wrap::before{
  content:'';position:absolute;inset:-2px;border-radius:14px;padding:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent2),transparent);
  background-size:300% 300%;
  animation:borderRun 6s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
  z-index:1;pointer-events:none;
}

/* UNLOCK BUTTON */
.unlock-btn{
  position:relative;width:100%;padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;
  color:#fff;font-family:'Orbitron',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;letter-spacing:2px;
  box-shadow:5px 5px 14px var(--nm-dark),-5px -5px 14px var(--nm-light),0 4px 22px var(--glow);
  transition:all .2s;overflow:visible;
}
.unlock-btn::before{
  content:'';position:absolute;inset:-2px;border-radius:14px;padding:2px;
  background:linear-gradient(90deg,transparent,#fff,var(--accent),var(--gold),var(--accent2),transparent);
  background-size:300% 300%;
  animation:borderRun 5s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;z-index:-1;
}
.unlock-btn:hover{transform:translateY(-2px);box-shadow:5px 5px 14px var(--nm-dark),-5px -5px 14px var(--nm-light),0 8px 30px var(--glow);}
.unlock-btn:active{transform:scale(.97);}

/* BUY BTN */
.buy-label{margin-top:14px;color:var(--text2);font-size:.85rem;}
.wa-btn{
  position:relative;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:10px;padding:13px 20px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  border-radius:14px;color:#fff;text-decoration:none;
  font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;
  box-shadow:4px 4px 12px var(--nm-dark),-4px -4px 12px var(--nm-light),0 4px 20px rgba(37,211,102,.3);
  transition:all .2s;overflow:visible;
}
.wa-btn::after{
  content:'';position:absolute;inset:-2px;border-radius:16px;padding:2px;
  background:linear-gradient(90deg,transparent,#fff,#25d366,#a8ff78,#25d366,transparent);
  background-size:300% 300%;
  animation:borderRun 5s linear infinite reverse;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;z-index:0;
}
.wa-btn i{font-size:1.3rem;animation:waPulse 1.8s ease-in-out infinite;}
.wa-btn:hover{transform:translateY(-3px);box-shadow:4px 4px 12px var(--nm-dark),-4px -4px 12px var(--nm-light),0 8px 28px rgba(37,211,102,.5);}
@keyframes waPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
@keyframes borderRun{0%{background-position:200% center;}100%{background-position:-200% center;}}

/* ERROR */
.login-err{color:var(--accent);font-size:.85rem;margin-top:10px;display:none;padding:8px;border-radius:8px;background:rgba(255,51,102,.1);}

/* THEME BTN */
.theme-btn{
  position:fixed;top:14px;right:14px;z-index:300;
  width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;
  background:var(--nm-bg);
  box-shadow:4px 4px 10px var(--nm-dark),-4px -4px 10px var(--nm-light);
  color:var(--text2);font-size:1rem;display:flex;align-items:center;justify-content:center;
}

/* WELCOME */
#welcomeScreen{background:var(--bg);}
.welcome-inner{text-align:center;animation:wIn .8s var(--tr);}
@keyframes wIn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
.welcome-icon{font-size:5rem;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.welcome-title{
  font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--gold),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:12px 0 8px;letter-spacing:3px;
}
.welcome-msg{color:var(--text2);font-size:1rem;}
.welcome-user{color:var(--gold);font-weight:700;}
.welcome-bar{width:200px;height:4px;background:var(--nm-dark);border-radius:2px;margin:20px auto 0;overflow:hidden;}
.welcome-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;animation:barFill 2.2s ease-in-out forwards;}
@keyframes barFill{to{width:100%;}}

/* TOPBAR */
.tk-topbar{
  height:60px;background:var(--nm-bg);
  box-shadow:0 4px 16px var(--nm-dark);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:100;flex-shrink:0;
}
.tk-brand{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:800;display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tk-brand-logo{width:34px;height:34px;border-radius:10px;object-fit:cover;}
.tk-right{display:flex;align-items:center;gap:10px;}
.key-badge{background:rgba(255,215,0,.12);color:var(--gold);border:1px solid rgba(255,215,0,.3);
  padding:4px 10px;border-radius:20px;font-size:.72rem;font-family:'Orbitron',sans-serif;}
.tk-icon-btn{width:38px;height:38px;border:none;border-radius:10px;cursor:pointer;
  background:var(--nm-bg);box-shadow:3px 3px 8px var(--nm-dark),-3px -3px 8px var(--nm-light);
  color:var(--text2);font-size:.95rem;display:flex;align-items:center;justify-content:center;}
.tk-icon-btn:hover{color:var(--accent);}

/* CONTENT */
.tk-content{flex:1;padding:24px 18px;max-width:1000px;margin:0 auto;width:100%;}
.section-title{
  font-family:'Orbitron',sans-serif;font-size:.85rem;color:var(--text2);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--nm-dark),transparent);}

/* KEY INFO */
.key-info-bar{
  background:var(--nm-bg);
  box-shadow:6px 6px 14px var(--nm-dark),-6px -6px 14px var(--nm-light);
  border-radius:16px;padding:16px 20px;
  display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap;
}
.ki-icon{width:44px;height:44px;border-radius:12px;background:var(--nm-bg);
  box-shadow:inset 3px 3px 8px var(--nm-dark),inset -3px -3px 8px var(--nm-light);
  display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:1.1rem;}
.ki-key{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--gold);}
.ki-exp{font-size:.78rem;color:var(--text2);margin-top:2px;}
.ki-exp span{color:var(--green);font-weight:700;}

/* TOOLS GRID */
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
@media(max-width:600px){.tools-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:360px){.tools-grid{grid-template-columns:1fr;}}
/* Force all toolkit text visible */
#toolkitScreen *{-webkit-text-fill-color:inherit;}
#toolkitScreen .tool-name{color:#e0e0f0!important;-webkit-text-fill-color:#e0e0f0!important;font-weight:700;}
#toolkitScreen .tool-desc{color:#a0a0c0!important;-webkit-text-fill-color:#a0a0c0!important;}
#toolkitScreen .section-title{color:#a0a0c0!important;-webkit-text-fill-color:#a0a0c0!important;}
#toolkitScreen .ki-key{color:#ffd700!important;-webkit-text-fill-color:#ffd700!important;}
#toolkitScreen .ki-exp{color:#a0a0c0!important;-webkit-text-fill-color:#a0a0c0!important;}
#toolkitScreen .ki-exp span{color:#00ff88!important;-webkit-text-fill-color:#00ff88!important;}
.key-badge{color:#ffd700!important;-webkit-text-fill-color:#ffd700!important;}
.tk-footer{color:#6060a0!important;-webkit-text-fill-color:#6060a0!important;}

.tool-card{
  background:var(--nm-bg);
  box-shadow:5px 5px 12px var(--nm-dark),-5px -5px 12px var(--nm-light),0 0 0 1px rgba(255,51,102,0.15);
  border-radius:16px;padding:14px 10px;cursor:pointer;
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:7px;
  position:relative;overflow:hidden;
  transition:all .3s var(--tr);
  animation:cardEnter .5s var(--tr) both;
  border-bottom:2px solid rgba(255,51,102,0.3);
}
.tool-card:hover{
  transform:translateY(-4px);
  box-shadow:7px 7px 16px var(--nm-dark),-7px -7px 16px var(--nm-light),0 0 20px rgba(255,51,102,0.25);
  border-bottom-color:var(--accent);
}
@keyframes cardEnter{from{opacity:0;transform:translateY(20px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}

.tool-icon-wrap{
  width:46px;height:46px;border-radius:12px;
  background:var(--nm-bg);
  box-shadow:inset 3px 3px 8px var(--nm-dark),inset -3px -3px 8px var(--nm-light);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:var(--accent);transition:transform .3s;
}
.tool-card:hover .tool-icon-wrap{transform:scale(1.08) rotate(-4deg);}
.tool-icon-wrap img{width:28px;height:28px;border-radius:7px;object-fit:cover;}
.tool-name{font-weight:700;font-size:.88rem;color:var(--text);-webkit-text-fill-color:var(--text);}
.tool-desc{font-size:.72rem;color:var(--text2);-webkit-text-fill-color:var(--text2);line-height:1.3;}
.tool-arrow{display:none;}

.tools-loading{grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--nm-dark);border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-tools{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);}
.empty-tools i{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.4;}

/* FOOTER */
.tk-footer{text-align:center;padding:18px;color:var(--muted);font-size:.78rem;}

/* TOAST */
.tk-toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--nm-bg);
  box-shadow:5px 5px 14px var(--nm-dark),-5px -5px 14px var(--nm-light);
  color:var(--green);padding:11px 18px;border-radius:12px;font-size:.88rem;
  transform:translateY(100px);opacity:0;transition:all .4s var(--tr);z-index:9999;
  border-left:3px solid var(--green);
}
.tk-toast.show{transform:translateY(0);opacity:1;}
.tk-toast.err{color:var(--accent);border-left-color:var(--accent);}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div><div class="orb orb2"></div>
  <div class="orb orb3"></div><div class="orb orb4"></div>
  <div class="streak"></div><div class="streak"></div><div class="streak"></div>
  <div class="streak"></div><div class="streak"></div><div class="streak"></div>
</div>

<button class="theme-btn" onclick="toggleTheme()" id="themeBtnGlobal"><i class="fas fa-moon" id="themeIconG"></i></button>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJ8nLUpk-LmCebvSuzOB0EJx5tJvVKsPw",
  authDomain: "toolkit-73b2a.firebaseapp.com",
  databaseURL: "https://toolkit-73b2a-default-rtdb.firebaseio.com",
  projectId: "toolkit-73b2a",
  storageBucket: "toolkit-73b2a.firebasestorage.app",
  messagingSenderId: "350588325886",
  appId: "1:350588325886:web:4aa842d33799775a4d7aaf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// Silent anonymous auth for Firebase Rules
signInAnonymously(auth).catch(e => console.log("Auth:", e.message));

let curKey = null, curKeyData = null, curTheme = 'dark';

async function fbGet(p){
  try{
    const snap = await get(ref(db, p));
    return snap.exists() ? snap.val() : null;
  }catch{return null;}
}
async function fbSet(p,d){
  try{ await set(ref(db, p), d); }catch(e){ console.error(e); }
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toast(msg,err=false){
  const t=document.getElementById("tkToast");
  t.textContent=msg;t.className="tk-toast show"+(err?" err":"");
  setTimeout(()=>t.className="tk-toast",2800);
}

function setTheme(th){
  curTheme=th;
  document.documentElement.setAttribute("data-theme",th);
  const ic=th==="dark"?"fa-sun":"fa-moon";
  document.getElementById("themeIconG").className="fas "+ic;
  const tk=document.getElementById("themeIconTk");
  if(tk)tk.className="fas "+ic;
  localStorage.setItem("lh_theme",th);
}
function toggleTheme(){setTheme(curTheme==="dark"?"light":"dark");}

async function getDeviceId(){
  // Create unique device fingerprint
  const nav=window.navigator;
  const raw=nav.userAgent+nav.language+screen.width+screen.height+nav.hardwareConcurrency;
  let hash=0;
  for(let i=0;i<raw.length;i++){hash=((hash<<5)-hash)+raw.charCodeAt(i);hash|=0;}
  return "dev_"+Math.abs(hash).toString(36);
}

async function loginWithKey(){
  const k=document.getElementById("loginKey").value.trim().toUpperCase();
  const err=document.getElementById("loginErr");
  err.style.display="none";
  if(!k){err.textContent="⚠️ Please enter your license key!";err.style.display="block";return;}
  const keys=await fbGet("keys");
  if(!keys){err.textContent="❌ Connection failed. Try again.";err.style.display="block";return;}
  let fid=null,fk=null;
  for(const[id,key] of Object.entries(keys)){if(key.key===k){fid=id;fk=key;break;}}
  if(!fk){err.textContent="❌ Invalid key! Please check and try again.";err.style.display="block";return;}
  if(fk.expiry<Date.now()){err.textContent="⌛ Key expired! Please buy a new key.";err.style.display="block";return;}
  
  // Device lock check
  const deviceId = await getDeviceId();
  if(fk.deviceId && fk.deviceId !== deviceId){
    err.textContent="🔒 This key is already in use on another device!";
    err.style.display="block";return;
  }
  
  // Lock key to this device
  await fbSet("keys/"+fid+"/used",true);
  await fbSet("keys/"+fid+"/usedBy",k);
  await fbSet("keys/"+fid+"/deviceId",deviceId);
  
  curKey=k;curKeyData={...fk,id:fid};
  localStorage.setItem("lh_key",k);
  localStorage.setItem("lh_expiry",fk.expiry);
  localStorage.setItem("lh_device",deviceId);
  showWelcome();
}

function showWelcome(){
  showScreen("welcomeScreen");
  const s=await_settings();
  setTimeout(()=>{showScreen("toolkitScreen");loadToolkitUI();},2500);
}

async function await_settings(){
  const s=await fbGet("settings");
  if(!s)return;
  if(s.colors){const c=s.colors,r=document.documentElement.style;
    if(c.bg)r.setProperty("--bg",c.bg);
    if(c.accent){r.setProperty("--accent",c.accent);r.setProperty("--glow",c.accent+"66");}
    if(c.text)r.setProperty("--text",c.text);
  }
  if(s.theme)setTheme(s.theme);
  if(s.toolkit){
    const tk=s.toolkit;
    if(tk.name){document.getElementById("welcomeTitle").textContent=tk.name;document.getElementById("topbarName").textContent=tk.name;}
    if(tk.welcome)document.getElementById("welcomeMsg").textContent=tk.welcome;
  }
}

async function loadToolkitUI(){
  document.getElementById("kiKeyVal").textContent=curKey;
  document.getElementById("welcomeUser").textContent=curKey.substring(0,8)+"...";
  if(curKeyData){
    const d=Math.ceil((curKeyData.expiry-Date.now())/86400000);
    document.getElementById("kiExpiry").textContent=d+(d===1?" day":" days");
    document.getElementById("topKeyBadge").innerHTML='<i class="fas fa-clock"></i> '+d+"d left";
  }
  loadToolsGrid();
}

async function loadToolsGrid(){
  const tools=await fbGet("tools");
  const grid=document.getElementById("toolsGrid");
  grid.innerHTML="";
  if(!tools||!Object.keys(tools).length){
    grid.innerHTML='<div class="empty-tools"><i class="fas fa-tools"></i><p>No tools yet. Check back soon!</p></div>';return;
  }
  const active=Object.entries(tools).filter(([,t])=>t.active!==false);
  if(!active.length){grid.innerHTML='<div class="empty-tools"><i class="fas fa-tools"></i><p>No tools available.</p></div>';return;}
  active.forEach(([id,t],i)=>{
    const icon=t.iconBase64?'<img src="'+t.iconBase64+'" alt="'+t.name+'">':'<i class="'+( t.iconClass||"fas fa-star")+'"></i>';
    const card=document.createElement("a");
    card.className="tool-card";
    card.href=t.link||"#";card.target="_blank";card.rel="noopener noreferrer";
    card.style.animationDelay=(i*0.07)+"s";
    card.innerHTML='<div class="tool-icon-wrap">'+icon+'</div><div class="tool-name">'+t.name+'</div>'+(t.desc?'<div class="tool-desc">'+t.desc+'</div>':'')+'';
    grid.appendChild(card);
  });
}

async function buyKey(e){
  e.preventDefault();
  const phone=await fbGet("admin/phone")||"923277796795";
  const msg=encodeURIComponent("Hello! I want to buy a L❤️H Toolkit license key. Please assist me.");
  window.open("https://wa.me/"+phone.replace(/\D/g,"")+"?text="+msg,"_blank");
}

function doLogout(){
  curKey=null;curKeyData=null;
  localStorage.removeItem("lh_key");localStorage.removeItem("lh_expiry");
  document.getElementById("loginKey").value="";
  document.getElementById("loginErr").style.display="none";
  showScreen("loginScreen");toast("Logged out!");
}

function typeWriter(elId,text,speed,done){
  let i=0;const el=document.getElementById(elId);el.textContent="";
  function t(){if(i<text.length){el.textContent+=text.charAt(i);i++;setTimeout(t,speed);}else if(done)done();}
  t();
}

async function startTypewriter(){
  // Show title instantly - no delay, no repeat
  const el=document.getElementById("typeTitle");
  const c1=document.querySelector(".type-cursor");
  const c2=document.querySelector(".type-cursor2");
  if(el&&el.textContent.length>0)return; // Already typed - dont repeat
  if(el)el.textContent="L♥H TOOLKIT";
  if(c1)c1.style.display="none";
  if(c2){c2.style.display="inline-block";}
  // Type sub instantly
  const subEl=document.getElementById("typeSub");
  if(subEl)subEl.textContent="Enter your license key to access";
  if(c2)setTimeout(()=>{c2.style.opacity="0";},2000);
}

async function autoLogin(){
  const k=localStorage.getItem("lh_key");
  const exp=localStorage.getItem("lh_expiry");
  if(!k||!exp||parseInt(exp)<Date.now()){localStorage.removeItem("lh_key");localStorage.removeItem("lh_expiry");return;}
  const deviceId=await getDeviceId();
  const keys=await fbGet("keys");
  if(!keys)return;
  for(const[id,key] of Object.entries(keys)){
    if(key.key===k&&key.expiry>Date.now()&&(!key.deviceId||key.deviceId===deviceId)){
      curKey=k;curKeyData={...key,id};showWelcome();return;
    }
  }
  // Device mismatch - clear local storage
  localStorage.removeItem("lh_key");localStorage.removeItem("lh_expiry");
}

(function(){
  const allowed = [
    "lh-toolkit.vercel.app",
    "localhost",
    "127.0.0.1"
  ];
  const host = window.location.hostname.toLowerCase();
  const isAllowed = allowed.some(d => host === d || host.endsWith('.'+d));
  if(!isAllowed){
    // Blank the page completely
    document.documentElement.innerHTML = '';
    document.head.innerHTML = '';
    document.body.innerHTML = '';
    // Override everything
    Object.defineProperty(document,'body',{get:()=>null});
    window.stop();
    throw new Error('Unauthorized');
  }
})();

  setTheme(localStorage.getItem("lh_theme")||"dark");
